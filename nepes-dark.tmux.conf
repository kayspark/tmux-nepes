# Nepes Dark — tmux color scheme
# Source this from your tmux.conf: source-file /path/to/nepes-dark.tmux.conf

# Status bar
set -g status-style 'bg=default'
set -g status-left "#[fg=#4A6ABF,bold]#S"
set -ga status-left " #[fg=#A5A8AF,nobold]#(gitmux -cfg $HOME/.config/tmux/gitmux.yml)"
set -g status-right ''

# Window list
set -g window-status-current-format '#[fg=#FEA413,bold] #W'
set -g window-status-format '  #[fg=#6E6E78]#W'

# Pane borders
set -g pane-active-border-style 'fg=#4A6ABF,bg=default'
set -g pane-border-style 'fg=#3A3A3E,bg=default'

# Messages
set -g message-command-style bg=default,fg=#FEA413
set -g message-style bg=default,fg=#FEA413
set -g mode-style bg=#2D4A6A,fg=#D8D8DC

# Selection / copy mode
set -g copy-mode-match-style bg=#3A3A3E,fg=#D8D8DC
set -g copy-mode-current-match-style bg=#FEA413,fg=#1C1C1E

# Clock
set -g clock-mode-colour '#4A6ABF'
