# Nepes Dark — tmux color scheme
# Source this from your tmux.conf: source-file /path/to/nepes-dark.tmux.conf

# Status bar
set -g status-style 'bg=default'
set -g status-left "#[fg=#5C8CFF,bold]#S"
set -ga status-left " #[fg=#A5A8AF,nobold]#(gitmux -cfg $HOME/.config/tmux/gitmux.yml)"
set -g status-right ''

# Window list
set -g window-status-current-format '#[fg=#FEA413,bold] #W'
set -g window-status-format '  #[fg=#787068]#W'

# Pane borders
set -g pane-active-border-style 'fg=#5C8CFF,bg=default'
set -g pane-border-style 'fg=#3E3A38,bg=default'

# Messages
set -g message-command-style bg=default,fg=#FEA413
set -g message-style bg=default,fg=#FEA413
set -g mode-style bg=#2E4C7A,fg=#DCD8D4

# Selection / copy mode
set -g copy-mode-match-style bg=#3E3A38,fg=#DCD8D4
set -g copy-mode-current-match-style bg=#FEA413,fg=#1E1C1A

# Clock
set -g clock-mode-colour '#5C8CFF'
