# Nepes Light — tmux color scheme
# Source this from your tmux.conf: source-file /path/to/nepes-light.tmux.conf

# Status bar
set -g status-style 'bg=default'
set -g status-left "#[fg=#23438E,bold]#S"
set -ga status-left " #[fg=#7A7A84,nobold]#(gitmux -cfg $HOME/.config/tmux/gitmux.yml)"
set -g status-right ''

# Window list
set -g window-status-current-format '#[fg=#D08A10,bold] #W'
set -g window-status-format '  #[fg=#7A7A84]#W'

# Pane borders
set -g pane-active-border-style 'fg=#23438E,bg=default'
set -g pane-border-style 'fg=#D8D7D7,bg=default'

# Messages
set -g message-command-style bg=default,fg=#D08A10
set -g message-style bg=default,fg=#D08A10
set -g mode-style bg=#B8D0F0,fg=#1C1C1E

# Selection / copy mode
set -g copy-mode-match-style bg=#D8D7D7,fg=#1C1C1E
set -g copy-mode-current-match-style bg=#D08A10,fg=#F8F8F8

# Clock
set -g clock-mode-colour '#23438E'
